# Settings shared by every board live in [env]; each physical board gets its
# own [env:NAME] below. The only per-board difference is DEVICE_NAME, which is
# written as the InfluxDB `device` tag so multiple boards share one bucket yet
# stay separable in Grafana (each with its own section and alert thresholds).
#
# Flash a specific board:
#   pio run -e comfort  -t upload      # or: make flash ENV=comfort
#   pio run -e mushroom -t upload      # or: make flash ENV=mushroom
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    sensirion/Sensirion I2C SCD4x @ ^1.1.0
    claws/BH1750 @ ^1.3.0
    adafruit/Adafruit BME680 Library @ ^2.0.5
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    tobiasschuerg/ESP8266 Influxdb @ ^3.13.2

# Living-space board (the original): CO2/temp/humidity/light/pressure/gas.
[env:comfort]
build_flags = -D DEVICE_NAME='"esp32-aqm"'

# Mushroom growing bin: second ESP32 + SCD-41. Same firmware, its own tag.
[env:mushroom]
build_flags = -D DEVICE_NAME='"esp32-mushroom"'
