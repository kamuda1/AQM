# Auto-provisions the InfluxDB datasource in Grafana so no manual setup is
# needed. Org must match docker-compose.yml; the token is pulled from the
# INFLUXDB_ADMIN_TOKEN container env var (see docker-compose.yml / .env) via
# Grafana's $__env{} provisioning syntax. The datasource talks to the
# influxdb container over the compose network.
apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    jsonData:
      version: Flux
      organization: aqm
      defaultBucket: aqm
    secureJsonData:
      token: $__env{INFLUXDB_ADMIN_TOKEN}
