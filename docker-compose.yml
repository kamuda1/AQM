# InfluxDB + Grafana stack for the AQM time-series pipeline.
#
#   make stack-up      # start both services
#   make stack-down    # stop them
#
# InfluxDB is initialised in "setup" mode with the org/bucket/token below.
# These MUST match include/secrets.h. Change the token/password before any
# non-LAN deployment.
#
# After first start:
#   - InfluxDB UI:  http://localhost:8086   (login: admin / aqm-admin-pw)
#   - Grafana UI:   http://localhost:3000    (login: admin / admin)
# The Grafana InfluxDB datasource is auto-provisioned (see grafana/provisioning).

services:
  influxdb:
    image: influxdb:2.7
    container_name: aqm-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: aqm-admin-pw
      DOCKER_INFLUXDB_INIT_ORG: aqm
      DOCKER_INFLUXDB_INIT_BUCKET: aqm
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: aqm-dev-token-change-me
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2

  grafana:
    image: grafana/grafana:11.2.0
    container_name: aqm-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:
